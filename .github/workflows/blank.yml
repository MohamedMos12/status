name: "Fast HTTPX Subdomain Scan"

on:
  workflow_dispatch:

jobs:
  httpx-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y wget unzip

          # Install httpx latest release
          LATEST_HX=$(curl -s https://api.github.com/repos/projectdiscovery/httpx/releases/latest | jq -r '.tag_name')
          VERSION_NUMBER="${LATEST_HX#v}"
          DOWNLOAD_URL="https://github.com/projectdiscovery/httpx/releases/download/${LATEST_HX}/httpx_${VERSION_NUMBER}_linux_amd64.zip"
          wget "$DOWNLOAD_URL" -O httpx.zip
          unzip -o httpx.zip
          sudo mv httpx /usr/local/bin/
          sudo chmod +x /usr/local/bin/httpx
          rm httpx.zip

      - name: Run HTTPX Scan
        run: |
          if [ ! -f subdomains.txt ]; then
            echo "Error: subdomains.txt not found!"
            exit 1
          fi

          mkdir -p results

          # Run httpx with required flags
          httpx -l subdomains.txt -title -wc -sc -cl -ct -location -web-server -asn -silent -o results/httpx_all.txt

          # Split results by status codes
          awk -F '|' '
          {
            status = $2
            if (status >= 200 && status <= 209) print > "results/results_2xx.txt"
            else if (status >= 300 && status <= 309) print > "results/results_3xx.txt"
            else if (status == 404) print > "results/results_404.txt"
            else if (status >= 400 && status <= 409) print > "results/results_4xx.txt"
          }' results/httpx_all.txt

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: httpx-scan-results
          path: results/
