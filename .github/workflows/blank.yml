name: "Fast Subdomain Analyzer"

on:
  workflow_dispatch:

jobs:
  fast-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y jq curl unzip parallel dnsutils
          
          # Install httpx (for fast HTTP status checks)
          echo "Installing httpx..."
          wget https://github.com/projectdiscovery/httpx/releases/latest/download/httpx_amd64.zip -O httpx.zip
          unzip httpx.zip
          sudo mv httpx /usr/local/bin/
          sudo chmod +x /usr/local/bin/
          rm httpx.zip

          # Install asnmap (same كما عندك)
          echo "Installing asnmap..."
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/projectdiscovery/asnmap/releases/latest | jq -r '.tag_name')
          VERSION_NUMBER="${LATEST_RELEASE#v}"
          DOWNLOAD_URL="https://github.com/projectdiscovery/asnmap/releases/download/${LATEST_RELEASE}/asnmap_${VERSION_NUMBER}_linux_amd64.zip"
          wget "$DOWNLOAD_URL" -O asnmap.zip
          unzip asnmap.zip
          sudo mv asnmap /usr/local/bin/
          sudo chmod +x /usr/local/bin/asnmap
          rm asnmap.zip

      - name: Run Fast Analysis
        env:
          PDCP_API_KEY: ${{ secrets.PDCP_API_KEY }}
        run: |
          if [ -z "$PDCP_API_KEY" ]; then
            echo "Error: PDCP_API_KEY is missing"
            exit 1
          fi

          if [ ! -f subdomains.txt ]; then
            echo "Error: subdomains.txt not found"
            exit 1
          fi

          mkdir -p results

          export -f analyze_subdomain
          analyze_subdomain() {
            subdomain="$1"
            [[ -z "$subdomain" ]] && return

            ip=$(dig +short "$subdomain" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || echo "N/A")
            echo "$subdomain,$ip" >> results/asn_info.txt

            if [ "$ip" != "N/A" ]; then
              asn_data=$(asnmap -ip "$ip" -json -auth "$PDCP_API_KEY" -silent 2>/dev/null || echo "[]")
              asn=$(echo "$asn_data" | jq -r '.[0].asn // "N/A"')
              cidr=$(echo "$asn_data" | jq -r '.[0].cidr // "N/A"')
              echo "$subdomain,$ip,$asn,$cidr" >> results/asn_info.txt
            fi

            cname=$(dig +short "$subdomain" CNAME | head -n1 || echo "N/A")
            echo "$subdomain,$cname" >> results/cname_info.txt
          }

          # Parallel DNS & ASN analysis
          cat subdomains.txt | parallel -j 20 analyze_subdomain {}

          # Fast HTTP status check with httpx
          httpx -l subdomains.txt -silent -status-code -title -o results/http_results.txt

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: fast-scan-results
          path: results/
