name: "HTTPX Production Subdomain Scan"

on:
  workflow_dispatch:

jobs:
  httpx-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 55   # حماية من تعليق job

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install httpx
        run: |
          sudo apt-get update && sudo apt-get install -y wget unzip jq

          LATEST=$(curl -s https://api.github.com/repos/projectdiscovery/httpx/releases/latest | jq -r '.tag_name')
          VERSION="${LATEST#v}"
          URL="https://github.com/projectdiscovery/httpx/releases/download/${LATEST}/httpx_${VERSION}_linux_amd64.zip"

          wget "$URL" -O httpx.zip
          unzip -o httpx.zip
          sudo mv httpx /usr/local/bin/
          sudo chmod +x /usr/local/bin/httpx
          rm httpx.zip

      - name: Validate input
        run: |
          if [ ! -f subdomains.txt ]; then
            echo "❌ subdomains.txt not found"
            exit 1
          fi

          echo "📊 Total subdomains:"
          wc -l subdomains.txt

      - name: Prepare workspace
        run: |
          mkdir -p results chunks
          split -l 5000 subdomains.txt chunks/chunk_

      - name: HTTPX Scan (Production)
        run: |
          for file in chunks/chunk_*; do
            echo "🚀 Scanning $file"
            httpx -l "$file" \
              -title -wc -sc -cl -ct -location -web-server -asn \
              -threads 200 \
              -rate-limit 300 \
              -timeout 5 \
              -retries 1 \
              -no-fallback \
              -silent \
              >> results/httpx_all.txt
          done

      - name: Split Results by Status Code
        run: |
          awk -F '|' '
          {
            status=$2
            if (status >= 200 && status <= 209) print > "results/2xx.txt"
            else if (status >= 300 && status <= 309) print > "results/3xx.txt"
            else if (status == 404) print > "results/404.txt"
            else if (status >= 400 && status <= 409) print > "results/4xx.txt"
          }' results/httpx_all.txt

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: httpx-production-results
          path: results/
