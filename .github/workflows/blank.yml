# اسم سير العمل الذي سيظهر في واجهة GitHub Actions
name: "Subdomain Analyzer"

# تحديد متى يتم تشغيل هذا السير العمل
# هنا قمنا بتحديده للتشغيل اليدوي فقط
on:
  workflow_dispatch:

# تعريف المهام (Jobs) التي سيتم تنفيذها
jobs:
  scan-subdomains:
    # اسم المهمة
    name: "Scanning and Analyzing Subdomains"
    
    # تحديد نوع البيئة التي ستعمل عليها المهمة
    runs-on: ubuntu-latest

    # الخطوات التي ستتم تنفيذها في المهمة
    steps:
      # الخطوة 1: سحب الكود من المستودع
      - name: Checkout Repository
        uses: actions/checkout@v4

      # الخطوة 2: تثبيت الأدوات اللازمة (asnmap و jq)
        # الخطوة 2: تثبيت الأدوات اللازمة (asnmap و jq)
      - name: Install Dependencies
        run: |
          echo "Installing jq..."
          sudo apt-get update && sudo apt-get install -y jq curl unzip

          echo "Installing the latest version of asnmap..."
          # الحصول على أحدث إصدار من asnmap باستخدام GitHub API
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/projectdiscovery/asnmap/releases/latest | jq -r '.tag_name')
          echo "Latest release found: $LATEST_RELEASE"
          
          # بناء رابط التحميل ديناميكيًا
          # نزيل الحرف 'v' من اسم الإصدار ليتوافق مع اسم الملف
          VERSION_NUMBER="${LATEST_RELEASE#v}"
          DOWNLOAD_URL="https://github.com/projectdiscovery/asnmap/releases/download/${LATEST_RELEASE}/asnmap_${VERSION_NUMBER}_linux_amd64.zip"
          
          echo "Downloading from: $DOWNLOAD_URL"
          wget "$DOWNLOAD_URL" -O asnmap.zip
          unzip asnmap.zip
          sudo mv asnmap /usr/local/bin/
          sudo chmod +x /usr/local/bin/asnmap
          
          # تنظيف الملفات المؤقتة
          rm asnmap.zip
          echo "asnmap installed successfully."

      # الخطوة 3: تنفيذ السكربت الرئيسي للفحص
      # الخطوة 3: تنفيذ السكربت الرئيسي للفحص
      - name: Run Analysis Script
        run: |
          # إعداد ملفات المخرجات (استخدام touch أفضل من الإفراغ المباشر)
          touch asn_info.txt results_2xx.txt results_3xx.txt results_4xx.txt results_404.txt results_5xx.txt cname_info.txt

          # التأكد من وجود ملف المدخلات
          if [ ! -f subdomains.txt ]; then
            echo "Error: subdomains.txt not found!"
            exit 1
          fi

          echo "Starting analysis for subdomains..."
          
          # قراءة الملف سطراً بسطر مع تجاهل الأسطر الفارغة
          while IFS= read -r line || [ -n "$line" ]; do
            # تنظيف السطر من المسافات أو الرموز الغريبة
            subdomain=$(echo "$line" | xargs)
            
            # تخطي السطر إذا كان فارغاً تماماً
            [[ -z "$subdomain" ]] && continue

            echo "--------------------------------------------------"
            echo "Processing: $subdomain"

            # 1. البحث عن عنوان IP (أضفنا || true لمنع التوقف عند الخطأ)
            ip=$(dig +short "$subdomain" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)

            if [ -n "$ip" ]; then
              echo "  [+] IP Found: $ip"
              # 2. البحث عن ASN
              asn_data=$(asnmap -ip "$ip" -json || echo "")
              if [ -n "$asn_data" ] && [ "$asn_data" != "null" ]; then
                asn=$(echo "$asn_data" | jq -r '.[0].asn // "N/A"')
                cidr=$(echo "$asn_data" | jq -r '.[0].cidr // "N/A"')
                echo "  [+] ASN: $asn | Range: $cidr"
                echo "$subdomain,$ip,$asn,$cidr" >> asn_info.txt
              else
                echo "  [-] ASN/Range not found"
                echo "$subdomain,$ip,N/A,N/A" >> asn_info.txt
              fi
            else
              echo "  [-] Could not resolve IP"
              echo "$subdomain,N/A,N/A,N/A" >> asn_info.txt
            fi

            # 3. البحث عن CNAME
            cname=$(dig +short "$subdomain" CNAME || true)
            echo "$subdomain,${cname:-N/A}" >> cname_info.txt

            # 4. فحص كود الحالة
            url="https://$subdomain"
            status_code=$(curl -o /dev/null -s -w "%{http_code}" -L --max-time 10 "$url" || echo "000")
            
            if [ "$status_code" -eq 000 ]; then
              url="http://$subdomain"
              status_code=$(curl -o /dev/null -s -w "%{http_code}" -L --max-time 10 "$url" || echo "000")
            fi

            if [ "$status_code" -ne 000 ]; then
              title=$(curl -s -L --max-time 10 "$url" | grep -oP '<title>\K.*(?=</title>)' | head -n 1 || echo "N/A")
              echo "  [+] Status: $status_code | Title: $title"
              
              # توزيع النتائج
              case $status_code in
                2*) echo "$subdomain | $status_code | $title" >> results_2xx.txt ;;
                3*) echo "$subdomain | $status_code | $title" >> results_3xx.txt ;;
                404) echo "$subdomain | $status_code | $title" >> results_404.txt
                     echo "$subdomain | $status_code | $title" >> results_4xx.txt ;;
                4*) echo "$subdomain | $status_code | $title" >> results_4xx.txt ;;
                5*) echo "$subdomain | $status_code | $title" >> results_5xx.txt ;;
              esac
            fi

          done < subdomains.txt
          
          echo "--------------------------------------------------"
          echo "Analysis complete."

      # الخطوة 4: رفع الملفات الناتجة كـ "Artifacts" لتنزيلها بسهولة
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: scan-results
          path: |
            asn_info.txt
            results_2xx.txt
            results_3xx.txt
            results_4xx.txt
            results_404.txt
            cname_info.txt
